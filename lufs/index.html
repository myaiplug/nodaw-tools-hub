  <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is LUFS?","acceptedAnswer":{"@type":"Answer","text":"LUFS (Loudness Units relative to Full Scale) is the standard for measuring perceived loudness in audio mastering. It accounts for how human hearing perceives volume across different frequencies, unlike simple peak or RMS measurements."}},{"@type":"Question","name":"What LUFS level should I master to?","acceptedAnswer":{"@type":"Answer","text":"Streaming platforms use different targets: Spotify and YouTube normalize to -14 LUFS, Apple Music to -16 LUFS, and Amazon Music to -10 to -14 LUFS. For general mastering, -9 to -13 LUFS is a common range depending on genre."}},{"@type":"Question","name":"What's the difference between integrated and short-term LUFS?","acceptedAnswer":{"@type":"Answer","text":"Integrated LUFS measures the average loudness over the entire track. Short-term LUFS measures loudness over a 3-second sliding window, showing how loudness changes throughout the song."}},{"@type":"Question","name":"What is true peak?","acceptedAnswer":{"@type":"Answer","text":"True peak measures the actual maximum level of your audio after digital-to-analog conversion, accounting for inter-sample peaks that standard peak meters miss. Keep true peak below -1 dBTP for clean streaming playback."}}]}</script>
