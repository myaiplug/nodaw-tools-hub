  <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is audio mastering?","acceptedAnswer":{"@type":"Answer","text":"Mastering is the final step in audio production — applying compression, EQ, limiting, and loudness normalization to polish a mix for distribution. The Mastering Tool provides a complete chain of processors to prepare your track for streaming platforms."}},{"@type":"Question","name":"What LUFS target should I use for mastering?","acceptedAnswer":{"@type":"Answer","text":"-14 LUFS is the standard for Spotify and YouTube. -16 LUFS for Apple Music. The Mastering Tool lets you set your target and automatically normalizes to it. For most genres, -9 to -13 LUFS is ideal."}},{"@type":"Question","name":"What's the difference between compression and limiting?","acceptedAnswer":{"@type":"Answer","text":"Compression reduces the dynamic range of your audio with a ratio typically between 2:1 and 10:1. Limiting (ratio 20:1 or higher) catches only the loudest peaks to prevent clipping. The Mastering Tool has both — use compression for overall dynamics and the limiter as a safety ceiling."}},{"@type":"Question","name":"Can I master any audio file?","acceptedAnswer":{"@type":"Answer","text":"Yes. Upload any supported audio file (MP3, WAV, FLAC, OGG, M4A) and the Mastering Tool processes it through a full chain: compressor, limiter, stereo widener, and LUFS normalization. All processing is done in your browser."}}]}</script>
